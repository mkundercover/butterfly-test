<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="webxr-polyfill-config" content="enabled: false">
    <title>Farfalle AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div id="overlay">
       <button id="start-btn" class="btn-start">START AR</button>
    </div>

    <a-scene webxr="requiredFeatures: hit-test, local-floor" renderer="logarithmicDepthBuffer: true; colorManagement: true;">
      <a-assets>
        <a-asset-item id="butterflyModel" src="assets/models/animated_butterfly_fucsia.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 1.6 0"></a-camera>
      <a-entity id="swarm" position="0 0 -1.5"></a-entity>
    </a-scene>
    <script src="js/main.js"></script>
  </body>
</html>
