<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Farfalle AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <!-- ... -->
    <a-scene
      webxr="requiredFeatures: hit-test, local-floor"
      renderer="colorManagement: true; antialias: true"
      vr-mode-ui="enabled: false">
      <a-assets>
        <a-asset-item id="butterflyModel" src="assets/models/animated_butterfly_fucsia.glb"></a-asset-item>
      </a-assets>

      <a-camera id="main-camera" position="0 1.6 0"></a-camera>
      
      <a-entity id="swarm"></a-entity>


      <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
      <a-entity light="type: directional; intensity: 1; position: 1 1 1;"></a-entity>
    </a-scene>

    <script src="js/main.js"></script>
  </body>
</html>
