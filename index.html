<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <title>Farfalle AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js?v=1"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js?v=1"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js?v=1"></script>
    <link rel="stylesheet" href="css/style.css?v=1">
    </head>
    <body style="margin: 0; overflow: hidden;">
    <div id="overlay">
       <button id="start-btn" class="btn-start">START</button>
    </div>

    <a-scene embedded arjs='sourceType: webcam; trackingMethod: best; debugUIEnabled: false;' vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;">
      <a-assets>
        <a-asset-item id="butterflyModel" src="assets/models/animated_butterfly_fucsia.glb?v=1"></a-asset-item>
      </a-assets>
      <a-entity id="swarm" position="0 0 -2"></a-entity>
    </a-scene>
    <script src="js/main.js?v=1"></script>
  </body>
</html>
