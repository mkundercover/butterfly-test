<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <title>Farfalle AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body style="margin: 0; overflow: hidden;">
    <div id="overlay">
       <button id="start-btn" class="btn-start">START</button>
    </div>

    <a-scene embedded arjs='sourceType: webcam; trackingMethod: best; debugUIEnabled: false;' vr-mode-ui="enabled: false">
      <a-assets>
        <a-asset-item id="butterflyModel" src="assets/models/animated_butterfly_fucsia.glb"></a-asset-item>
      </a-assets>
      <a-entity id="swarm" position="0 0 -2"></a-entity>
      <a-camera-static />
    </a-scene>
    <script src="js/main.js"></script>
  </body>
</html>
