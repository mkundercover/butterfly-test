<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script>
      window.WebVRConfig = { DPDB_DATA: { devices: [] } };
      window.WebXRPolyfill = null;
    </script>
    <title>Farfalle AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="vendor/aframe-extras-6.1.1.min.js?v=7"></script>
    <link rel="stylesheet" href="css/style.css?v=7">
  </head>
  <body>
    <video id="ar-video" autoplay playsinline muted></video>

    <div id="overlay">
      <!-- onclick diretto: non dipende da addEventListener né da DOMContentLoaded -->
      <button id="start-btn" class="btn-start" onclick="startAR()">START AR</button>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="alpha: true; colorManagement: true; antialias: true"
      loading-screen="enabled: false">
      <a-assets>
        <a-asset-item id="butterflyModel" src="assets/models/animated_butterfly_fucsia.glb"></a-asset-item>
      </a-assets>
      <a-camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: true"></a-camera>
      <a-entity id="swarm"></a-entity>
    </a-scene>

    <script src="js/main.js?v=7"></script>
  </body>
</html>
